<div ng-class="{fullscreen:config.fullscreen}" class="transcription">
    <alert ng-repeat="m in messages" type="{{m.type}}">{{m.text}}</alert>
    <div ng-if="!messages.length">
        <div id="imgTop">
            <img selector="transcriptionClip(focus.on)">
            <canvas></canvas>
        </div>
        <div id="workspace">
            workspace
        </div>
        <div id="imgBottom">
            <img selector="transcriptionClip(focus.on,true)">
            <canvas></canvas>
        </div>
    </div>
    <nav>
        <select ng-model="canvas" class="form-control"
                ng-options="(c.label||$index) for c in manifest.sequences[config.currentSequenceIndex].canvases">
        </select>
    </nav>
</div>
